name: Rust CI

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  SQLX_OFFLINE: true

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  test:
    name: Test with Coverage
    # Don't spend the expensive test/coverage job on commits that fail the
    # fast lint checks
    needs: [clippy, fmt]
    runs-on: ubuntu-latest
    # id-token enables the Codecov OIDC upload (also requires the same grant
    # on the caller job — reusable workflows only get what the caller allows)
    permissions:
      id-token: write
      contents: read
    services:
      postgres:
        image: postgres:17-bookworm
        env:
          POSTGRES_USER: kruxiaflow
          POSTGRES_PASSWORD: kruxiaflow_test
          POSTGRES_DB: kruxiaflow
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # Prebuilt binaries instead of `cargo install` (which compiles from
      # source on every run — minutes of CI time per tool).
      - name: Install cargo-llvm-cov, cargo-nextest, and sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest,sqlx-cli

      - name: Create test database
        run: psql -h localhost -U kruxiaflow -c "CREATE DATABASE kruxiaflow_test;"
        env:
          PGPASSWORD: kruxiaflow_test

      - name: Run migrations
        run: sqlx migrate run
        env:
          DATABASE_URL: postgres://kruxiaflow:kruxiaflow_test@localhost:5432/kruxiaflow_test

      - name: Run tests with coverage
        run: ./scripts/test.sh --coverage-ci --skip-db-setup
        env:
          DATABASE_URL: postgres://kruxiaflow:kruxiaflow_test@localhost:5432/kruxiaflow_test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          # OIDC instead of a CODECOV_TOKEN secret: nothing to rotate. Needs
          # id-token: write here AND on the caller job (main-ci.yml `rust:`),
          # plus the Codecov GitHub App installed on the repo.
          use_oidc: true
          # Flip to true once the first upload succeeds, so upload regressions
          # are visible instead of silently green.
          fail_ci_if_error: false
