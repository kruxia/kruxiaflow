name: Main CI

# Single pipeline for branch CI and releases, with ordered dependencies.
#
# - Pull requests / pushes to main: rust checks; main pushes also refresh the
#   rolling Docker image (:latest + date tag).
# - Tag pushes (v*): the FULL release pipeline on one run — rust checks →
#   binaries + versioned multi-arch Docker + crates.io (kruxiaflow-worker) →
#   GitHub Release. Nothing publishes unless the checks pass.
#
# A single docker job serves main pushes (:latest + date tag) and tag pushes
# (semver + :latest) through the reusable docker-build.yml workflow: one
# native runner per platform (no QEMU), then a manifest-list merge.
# metadata-action emits only the tags that apply to the triggering event. The
# rolling build is multi-arch too, so :latest never flips to amd64-only
# between releases and main keeps both platforms' GHA layer caches warm for
# the release builds.
#
# `cargo release` pushes a version-bump commit AND a tag for the same SHA.
# The branch-push run is skipped for those commits (message "release: ...",
# configured in [workspace.metadata.release]) — the tag run covers everything.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  rust:
    name: Rust CI
    # Skip the redundant branch-push run for release commits: the tag run
    # (same SHA) performs these checks as part of the release pipeline.
    if: github.ref_type == 'tag' || !startsWith(github.event.head_commit.message, 'release:')
    uses: ./.github/workflows/rust-ci.yml
    secrets: inherit

  # ---- tags: release pipeline -----------------------------------------------

  preflight:
    name: Verify tag matches workspace version
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag against Cargo.toml
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} != workspace version ${CARGO_VERSION}. Use: cargo release ${TAG_VERSION}"
            exit 1
          fi

  binaries:
    name: Binary ${{ matrix.target }}
    needs: [rust, preflight]
    if: github.ref_type == 'tag'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # musl (fully static) targets are deferred: kruxiaflow does not
        # currently build against musl. gnu builds are dynamically linked
        # against glibc — x86_64 builds on ubuntu-22.04 to keep the glibc
        # floor at 2.35; aarch64 runs through cross (older container baseline).
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install cross
        if: matrix.use-cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # --features redis-cache matches the Docker image build (Dockerfile
      # build stage) so released binaries and images have identical features.
      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p kruxiaflow --features redis-cache
          else
            cargo build --release --locked --target ${{ matrix.target }} -p kruxiaflow --features redis-cache
          fi

      - name: Package with checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="kruxiaflow-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$ARCHIVE" kruxiaflow
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            kruxiaflow-*.tar.gz
            kruxiaflow-*.tar.gz.sha256
          if-no-files-found: error

  # ---- docker images: main pushes AND release tags --------------------------

  # One job for both triggers (they never occur in the same run): main pushes
  # publish :latest + a date-sha tag, tag pushes publish semver + :latest.
  # metadata-action emits only the tag types that apply to the event.
  docker:
    name: Docker multi-arch
    needs: [rust, preflight]
    # `!cancelled()` lets the job run on main pushes even though preflight is
    # skipped there; tag runs still hard-require preflight success. PRs match
    # neither ref condition.
    if: >-
      !cancelled() && needs.rust.result == 'success' &&
      (github.ref == 'refs/heads/main' ||
       (github.ref_type == 'tag' && needs.preflight.result == 'success'))
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      tags: |
        type=semver,pattern={{version}}
        type=semver,pattern={{major}}.{{minor}}
        type=raw,value=latest
        type=raw,value={{date 'YYYYMMDD'}}-{{sha}},enable={{is_default_branch}}

  # ---- crates.io: the public worker SDK crate --------------------------------

  # Publishes kruxiaflow-worker (worker-sdk/) via crates.io Trusted Publishing
  # (OIDC — no long-lived token secret). One-time setup, after the crate's
  # first manual publish: crates.io → kruxiaflow-worker → Settings → Trusted
  # Publishing → GitHub repo kruxia/kruxiaflow, workflow main-ci.yml,
  # environment crates-io. Internal crates are publish = false, so only the
  # SDK can ever ship from here. The version comes from the workspace (tag ==
  # version is enforced by preflight); the skip guard makes tag-run re-runs
  # idempotent when the version is already up.
  crates:
    name: crates.io publish
    needs: [rust, preflight]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Skip if this version is already on crates.io
        id: guard
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if curl -fsSL -A "kruxiaflow-ci (github.com/kruxia/kruxiaflow)" \
              "https://crates.io/api/v1/crates/kruxiaflow-worker/${VERSION}" >/dev/null 2>&1; then
            echo "::notice::kruxiaflow-worker ${VERSION} already published; skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io (OIDC)
        if: steps.guard.outputs.publish == 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish kruxiaflow-worker
        if: steps.guard.outputs.publish == 'true'
        run: cargo publish -p kruxiaflow-worker --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  release:
    name: GitHub Release
    needs: [binaries, docker, crates]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
