name: Performance Profiling

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://streamflow:streamflow@localhost/streamflow_bench
  STREAMFLOW_BASE_URL: http://localhost:8080
  # OAuth configuration for CI
  STREAMFLOW_CLIENT_ID: streamflow-ci-client
  STREAMFLOW_OAUTH_TOKEN_ISSUER: http://localhost:8080
  STREAMFLOW_OAUTH_TOKEN_AUDIENCE: streamflow-profiling

jobs:
  profiling:
    name: Run HTTP API Performance Profiling
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: streamflow
          POSTGRES_PASSWORD: streamflow
          POSTGRES_DB: streamflow_bench
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run database migrations
        run: sqlx migrate run

      - name: Seed OAuth client for profiling
        run: cargo run --package streamflow --bin streamflow -- seed-client
        env:
          STREAMFLOW_CLIENT_ID: streamflow-ci-client
          STREAMFLOW_CLIENT_SECRET: ${{ secrets.PROFILING_CLIENT_SECRET || 'profiling-client-secret-for-ci' }}

      - name: Build StreamFlow
        run: cargo build --release --bin streamflow

      - name: Start StreamFlow server in background
        run: |
          ./target/release/streamflow serve --port 8080 &
          sleep 5
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -f http://localhost:8080/health; do sleep 1; done'

      - name: Register profiling workflow definitions
        run: |
          # TODO: Create script to register workflow definitions via API
          # For now, assume they're pre-registered in database migrations

      - name: Run HTTP API load tests
        run: |
          cargo test --package streamflow-profiling --release -- --nocapture --test-threads=1 | tee load-test-output.txt

      - name: Parse profiling results
        id: parse_results
        run: |
          python scripts/parse_profiling_results.py load-test-output.txt > profiling-results.json

      - name: Download baseline results
        id: download_baseline
        continue-on-error: true
        uses: actions/download-artifact@v3
        with:
          name: profiling-baseline
          path: baseline/

      - name: Compare with baseline
        id: compare
        run: |
          if [ -f baseline/profiling-results.json ]; then
            python scripts/compare_profiling.py baseline/profiling-results.json profiling-results.json > comparison.json
            echo "has_baseline=true" >> $GITHUB_OUTPUT
          else
            echo "has_baseline=false" >> $GITHUB_OUTPUT
            echo "No baseline found, establishing new baseline"
          fi

      - name: Check for regression
        if: steps.compare.outputs.has_baseline == 'true'
        run: |
          python scripts/check_regression.py comparison.json

      - name: Generate HTML report
        run: |
          python scripts/generate_report.py profiling-results.json comparison.json > report.html

      - name: Upload profiling results
        uses: actions/upload-artifact@v3
        with:
          name: profiling-results-${{ github.sha }}
          path: |
            profiling-results.json
            comparison.json
            report.html
            load-test-output.txt

      - name: Update baseline (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v3
        with:
          name: profiling-baseline
          path: profiling-results.json

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && steps.compare.outputs.has_baseline == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comparison = JSON.parse(fs.readFileSync('comparison.json', 'utf8'));

            const body = `## Performance Profiling Results

            ### Summary
            - **Throughput**: ${comparison.throughput.current.toFixed(2)} wf/sec (${comparison.throughput.change > 0 ? '+' : ''}${comparison.throughput.change.toFixed(1)}%)
            - **P99 Latency**: ${comparison.p99_latency.current} ms (${comparison.p99_latency.change > 0 ? '+' : ''}${comparison.p99_latency.change.toFixed(1)}%)

            ${comparison.regression ? '⚠️ **Performance regression detected!**' : '✅ No performance regression'}

            <details>
            <summary>Detailed Results</summary>

            \`\`\`json
            ${JSON.stringify(comparison, null, 2)}
            \`\`\`

            </details>

            [Full Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail on regression
        if: steps.compare.outputs.has_baseline == 'true'
        run: |
          if grep -q '"regression": true' comparison.json; then
            echo "Performance regression detected!"
            exit 1
          fi
