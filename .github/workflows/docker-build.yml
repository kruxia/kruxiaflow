name: Docker Build

# Reusable multi-arch image pipeline. Each platform builds NATIVELY on its own
# runner (arm64 on ubuntu-24.04-arm — free for public repos) instead of under
# QEMU emulation, which made the Rust release build take >1 hour. Each build
# pushes by digest only; the merge job then stitches the digests into a single
# multi-arch manifest list carrying the caller-supplied tags, so no tag ever
# points at a partial image.
#
# GHA layer cache is scoped per platform so the two arches don't evict each
# other. Tag runs can restore caches written on main (the default branch), so
# rolling builds on main keep both platform caches warm for releases.

on:
  workflow_call:
    inputs:
      tags:
        description: docker/metadata-action tags spec for the merged manifest
        required: true
        type: string

env:
  IMAGE: kruxia/kruxiaflow

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # linux/amd64 -> linux-amd64 for use in cache scopes and artifact names
      - name: Sanitize platform name
        id: platform
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "pair=${PLATFORM//\//-}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Labels only — tags are applied by the merge job on the manifest list
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          target: deploy
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ steps.platform.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.pair }}

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.platform.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest list
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: ${{ inputs.tags }}

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          args=()
          while IFS= read -r tag; do
            args+=(-t "$tag")
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          for digest in *; do
            args+=("${IMAGE}@sha256:${digest}")
          done
          docker buildx imagetools create "${args[@]}"

      - name: Inspect
        run: docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}"
