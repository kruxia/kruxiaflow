name: Release

# Tagged releases: build static binaries for three targets, publish multi-arch
# Docker images, and create a GitHub Release with checksummed artifacts.
#
# Trigger: push an annotated tag `vX.Y.Z`.
# Required repository secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  # Compile-time sqlx query validation uses the checked-in .sqlx offline data;
  # release builds must not require a live database.
  SQLX_OFFLINE: "true"

permissions:
  contents: write

jobs:
  binaries:
    name: Binary ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # musl (fully static) targets are deferred: kruxiaflow does not currently
        # build against musl. gnu builds are dynamically linked against glibc —
        # x86_64 builds on ubuntu-22.04 to keep the glibc floor at 2.35; the
        # aarch64 build runs through cross, whose container has an older baseline.
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            use-cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install cross
        if: matrix.use-cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }} -p kruxiaflow
          else
            cargo build --release --locked --target ${{ matrix.target }} -p kruxiaflow
          fi

      - name: Package with checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="kruxiaflow-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$ARCHIVE" kruxiaflow
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            kruxiaflow-*.tar.gz
            kruxiaflow-*.tar.gz.sha256
          if-no-files-found: error

  docker:
    name: Docker multi-arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: kruxia/kruxiaflow
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: deploy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    needs: [binaries, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
