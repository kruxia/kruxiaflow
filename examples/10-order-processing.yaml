# Example 10: Order Processing with Email Notification
#
# This workflow demonstrates a complete e-commerce order processing flow
# using real database resources:
# - postgres_query for inventory validation, reservation, and payment
# - postgres_transaction for atomic order recording
# - http_request to Mailpit REST API for HTML email confirmation
#
# What This Example Demonstrates:
# - postgres_query with SELECT, UPDATE (RETURNING), and INSERT
# - postgres_transaction with multiple statements and RETURNING
# - http_request to Mailpit REST API for HTML email
# - Sequential dependency chain with conditional execution
# - Real-world e-commerce order flow using only database + email
#
# Prerequisites:
# - Examples environment (./docker up --examples)
# - Database with inventory, payments, and orders tables (auto-created)
# - Mailpit for email capture (auto-started with examples environment)
#
# Secrets Required:
# - SECRET.db_url: PostgreSQL connection URL
#
# Input Schema:
# {
#   "customer_id": "cust_123",
#   "customer_email": "customer@example.com",
#   "product_id": "prod_001",
#   "quantity": 2,
#   "amount": 99.99
# }
#
# Workflow Pattern:
# validate_inventory → reserve_inventory → process_payment → record_order → send_confirmation
#  (postgres_query)    (postgres_query)    (postgres_query)  (postgres_txn)  (http_request)
#
# Expected Execution Flow:
#
# 1. validate_inventory:
#    - SELECT available, reserved, unreserved from inventory
#    - Returns stock levels for the requested product
#    - Only proceeds if unreserved >= requested quantity
#
# 2. reserve_inventory (conditional on sufficient stock):
#    - UPDATE inventory SET reserved = reserved + quantity
#    - Atomic check: WHERE (available - reserved) >= quantity
#    - Returns updated reservation count
#
# 3. process_payment (depends on successful reservation):
#    - INSERT INTO payments with customer, amount, product details
#    - Returns transaction_id and status
#    - Simulates payment processing via database record
#
# 4. record_order (depends on successful payment):
#    - Atomic transaction with two statements:
#      a) INSERT into orders table, RETURNING order_id
#      b) UPDATE inventory: decrement reserved and available
#    - Transaction ensures both succeed or both rollback
#
# 5. send_confirmation (depends on order recording):
#    - POST to Mailpit REST API with HTML email body
#    - Includes order ID, product, quantity, amount, payment ID
#    - View at http://localhost:8025
#
# Error Handling:
# - If inventory insufficient: workflow stops (condition blocks reserve)
# - If reservation fails: workflow stops (no payment processed)
# - If payment fails: workflow stops (no order recorded)
# - If database transaction fails: rollback (payment record exists - needs compensation)
# - If email fails: order still valid (email can be retried manually)

name: order_processing
description: Process order with inventory check, payment, database transaction, and email confirmation

activities:
  # Step 1: Validate inventory availability
  - key: validate_inventory
    worker: std
    activity_name: postgres_query
    parameters:
      db_url: "{{SECRET.db_url}}"
      query: >
        SELECT available, reserved, (available - reserved) AS unreserved
        FROM inventory
        WHERE product_id = $1
      params:
        - "{{INPUT.product_id}}"
    outputs:
      - result

  # Step 2: Reserve inventory (only if sufficient stock)
  - key: reserve_inventory
    worker: std
    activity_name: postgres_query
    parameters:
      db_url: "{{SECRET.db_url}}"
      query: >
        UPDATE inventory
        SET reserved = reserved + $1
        WHERE product_id = $2
          AND (available - reserved) >= $1
        RETURNING product_id, reserved
      params:
        - "{{INPUT.quantity}}"
        - "{{INPUT.product_id}}"
    outputs:
      - result
    depends_on:
      - activity_key: validate_inventory
        condition: "{{validate_inventory.result.rows[0].unreserved >= INPUT.quantity}}"

  # Step 3: Process payment (simulated via database insert)
  - key: process_payment
    worker: std
    activity_name: postgres_query
    parameters:
      db_url: "{{SECRET.db_url}}"
      query: >
        INSERT INTO payments (customer_id, amount, currency, product_id, quantity)
        VALUES ($1, $2, 'USD', $3, $4)
        RETURNING id AS transaction_id, status
      params:
        - "{{INPUT.customer_id}}"
        - "{{INPUT.amount}}"
        - "{{INPUT.product_id}}"
        - "{{INPUT.quantity}}"
    outputs:
      - result
    depends_on:
      - activity_key: reserve_inventory

  # Step 4: Record order in database (atomic transaction)
  - key: record_order
    worker: std
    activity_name: postgres_transaction
    parameters:
      db_url: "{{SECRET.db_url}}"
      statements:
        - query: |
            INSERT INTO orders
            (customer_id, customer_email, product_id, quantity, amount, payment_txn_id, status)
            VALUES ($1, $2, $3, $4, $5, $6, 'confirmed')
            RETURNING id AS order_id
          params:
            - "{{INPUT.customer_id}}"
            - "{{INPUT.customer_email}}"
            - "{{INPUT.product_id}}"
            - "{{INPUT.quantity}}"
            - "{{INPUT.amount}}"
            - "{{process_payment.result.rows[0].transaction_id}}"
        - query: |
            UPDATE inventory
            SET reserved = reserved - $1,
                available = available - $1
            WHERE product_id = $2
          params:
            - "{{INPUT.quantity}}"
            - "{{INPUT.product_id}}"
    outputs:
      - result
    depends_on:
      - activity_key: process_payment

  # Step 5: Send confirmation email via Mailpit REST API
  - key: send_confirmation
    worker: std
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Email: "orders@example.com"
          Name: "Kruxia Flow Orders"
        To:
          - Email: "{{INPUT.customer_email}}"
            Name: "Customer"
        Subject: "Order Confirmation - #{{record_order.result.results[0].rows[0].order_id}}"
        HTML: |
          <html>
          <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
            <div style="background-color: #2e7d32; color: white; padding: 20px; text-align: center;">
              <h1 style="margin: 0;">Order Confirmed!</h1>
            </div>

            <div style="padding: 20px;">
              <p>Dear Customer,</p>
              <p>Thank you for your order. Here are your order details:</p>

              <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
                <tr style="background-color: #f5f5f5;">
                  <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">Order ID</td>
                  <td style="padding: 12px; border: 1px solid #ddd;">#{{record_order.result.results[0].rows[0].order_id}}</td>
                </tr>
                <tr>
                  <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">Product</td>
                  <td style="padding: 12px; border: 1px solid #ddd;">{{INPUT.product_id}}</td>
                </tr>
                <tr style="background-color: #f5f5f5;">
                  <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">Quantity</td>
                  <td style="padding: 12px; border: 1px solid #ddd;">{{INPUT.quantity}}</td>
                </tr>
                <tr>
                  <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">Amount</td>
                  <td style="padding: 12px; border: 1px solid #ddd;">${{INPUT.amount}}</td>
                </tr>
                <tr style="background-color: #f5f5f5;">
                  <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">Payment ID</td>
                  <td style="padding: 12px; border: 1px solid #ddd;">{{process_payment.result.rows[0].transaction_id}}</td>
                </tr>
                <tr>
                  <td style="padding: 12px; border: 1px solid #ddd; font-weight: bold;">Status</td>
                  <td style="padding: 12px; border: 1px solid #ddd; color: #2e7d32; font-weight: bold;">Confirmed</td>
                </tr>
              </table>

              <p>Your order is being processed and you will receive shipping information soon.</p>

              <p>If you have any questions about your order, please contact our support team.</p>

              <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;">

              <p style="color: #666; font-size: 12px;">
                This is an automated message from Kruxia Flow Order Processing.<br>
                Order placed on {{WORKFLOW.started_at}}
              </p>
            </div>
          </body>
          </html>
        Text: |
          Order Confirmed!

          Thank you for your order. Here are your order details:

          Order ID: #{{record_order.result.results[0].rows[0].order_id}}
          Product: {{INPUT.product_id}}
          Quantity: {{INPUT.quantity}}
          Amount: ${{INPUT.amount}}
          Payment ID: {{process_payment.result.rows[0].transaction_id}}
          Status: Confirmed

          Your order is being processed and you will receive shipping information soon.

          If you have any questions about your order, please contact our support team.

          ---
          This is an automated message from Kruxia Flow Order Processing.
    depends_on:
      - activity_key: record_order
