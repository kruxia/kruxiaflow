name: research_assistant_google
description: Ask LLM question with Google-only fallback chain (budget-aware)

# This workflow demonstrates:
# - Multi-model fallback using ONLY Google models
# - Budget-aware model selection within a single provider
# - Automatic fallback from expensive to cheap models
# - Cost tracking with Google pricing

# Prerequisites:
# - GOOGLE_API_KEY environment variable
# - PostgreSQL database with research_log table

# Database Setup:
# CREATE TABLE research_log (
#     id SERIAL PRIMARY KEY,
#     question TEXT NOT NULL,
#     answer TEXT NOT NULL,
#     provider TEXT NOT NULL,
#     model TEXT NOT NULL,
#     cost DECIMAL(10, 6),
#     prompt_tokens INTEGER,
#     output_tokens INTEGER,
#     total_tokens INTEGER,
#     created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
# );

# Budget-Aware Fallback Behavior (with $0.01 budget):
# For typical prompt (100 input tokens + 1000 output tokens):
#
# 1. google/gemini-3-pro-preview ($2/$12 per M tokens):
#    Estimated cost: ~$0.0122 → SKIPPED (exceeds budget)
#
# 2. google/gemini-2.5-flash ($0.30/$2.50 per M tokens):
#    Estimated cost: ~$0.00253 → USED (fits within budget)
#
# 3. google/gemini-2.0-flash-lite ($0.075/$0.30 per M tokens):
#    Estimated cost: ~$0.0003075 → Backup (even cheaper)

activities:
  - key: ask_question
    worker: builtin
    activity_name: llm_prompt
    parameters:
      # Google-only fallback chain (expensive → cheap → very cheap)
      model:
        - google/gemini-3-pro-preview   # Expensive: $2/$12 per M tokens (will be skipped)
        - google/gemini-2.5-flash        # Cheap: $0.30/$2.50 per M tokens (will be used)
        - google/gemini-2.0-flash-lite   # Very cheap: $0.075/$0.30 per M tokens (backup)
      prompt: "{{INPUT.question}}"
      max_tokens: 1000
    outputs:
      - result
    settings:
      retry:
        max_attempts: 3
        strategy: exponential
        base_seconds: 2
        factor: 2
        max_seconds: 60
      budget:
        limit_usd: 0.01  # Tight budget to demonstrate budget-aware fallback
        action: abort

  - key: store_response
    worker: builtin
    activity_name: postgres_query
    parameters:
      query: |
        INSERT INTO research_log
        (question, answer, provider, model, cost, prompt_tokens, output_tokens, total_tokens, created_at)
        VALUES ($1, $2, $3, $4, $5, $6, $7, $8, NOW())
        RETURNING id
      params:
        - "{{INPUT.question}}"
        - "{{ask_question.result.content}}"
        - "{{ask_question.result.provider}}"
        - "{{ask_question.result.model}}"
        - "{{ask_question.result.cost_usd}}"
        - "{{ask_question.result.usage.prompt_tokens}}"
        - "{{ask_question.result.usage.output_tokens}}"
        - "{{ask_question.result.usage.total_tokens}}"
    outputs:
      - result
    depends_on:
      - ask_question
