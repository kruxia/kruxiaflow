name: validate_user
description: Validate user email and store result in database with conditional branching

activities:
  # Step 1: Check if email is valid using a validation service
  - key: check_email
    worker: builtin
    activity_name: http_request
    parameters:
      method: GET
      url: "https://httpbin.org/json"  # Using httpbin as a mock validation endpoint
    outputs:
      - response

  # Step 2a: Store valid user (only runs if valid)
  - key: store_valid_user
    worker: builtin
    activity_name: postgres_query
    parameters:
      db_url: "{{SECRET.db_url}}"
      query: "INSERT INTO valid_users (email, validated_at) VALUES ($1, NOW()) 
        ON CONFLICT (email) DO NOTHING"
      params:
        - "{{INPUT.email}}"
    depends_on:
      - activity_key: check_email
        condition: "{{check_email.response.success == true}}"

  # Step 2b: Store invalid user (only runs if invalid)
  - key: store_invalid_user
    worker: builtin
    activity_name: postgres_query
    parameters:
      db_url: "{{SECRET.db_url}}"
      query: "INSERT INTO invalid_users (email, reason, checked_at) 
        VALUES ($1, $2, NOW()) ON CONFLICT (email) DO NOTHING"
      params:
        - "{{INPUT.email}}"
        - "Email validation failed"
    depends_on:
      - activity_key: check_email
        condition: "{{check_email.response.success != true}}"

  # Step 3: Send notification (runs after either store activity completes)
  - key: send_notification
    worker: builtin
    activity_name: http_request
    parameters:
      method: POST
      url: "{{INPUT.notification_webhook_url}}"
      headers:
        Content-Type: "application/json"
      body:
        email: "{{INPUT.email}}"
        status: "{{check_email.response.success}}"
        workflow_id: "{{WORKFLOW.id}}"
    depends_on:
      - activity_key: store_valid_user
        condition: "{{check_email.response.success == true}}"
      - activity_key: store_invalid_user
        condition: "{{check_email.response.success != true}}"
