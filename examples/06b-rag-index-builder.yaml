# Example 6b: RAG Index Builder
#
# This workflow demonstrates embedding generation and bulk vector storage for RAG.
# It's the second of three Example 6 workflows focusing on the indexing phase.
#
# What This Example Demonstrates:
# - Batch embedding generation using Google Gemini Embedding 001
# - Bulk PostgreSQL vector storage with pgvector extension
# - Building a searchable knowledge base in two steps
#
# Related Example 6 Workflows:
# - 06a-faq-bot-caching.yaml: Semantic caching fundamentals
# - 06c-rag-query.yaml: Query the index built here with RAG pattern
#
# Prerequisites:
# - GOOGLE_API_KEY for embedding generation
# - PostgreSQL with pgvector extension installed
#
# Workflow Pattern:
# generate_embeddings → store_chunks → confirm_indexing
#
# Expected Execution Flow:
#
# Given input chunks: [
#   "Rust is a systems programming language...",
#   "Rust's ownership model ensures memory safety...",
#   "Cargo is Rust's package manager..."
# ]
#
# 1. generate_embeddings:
#    - Sends all chunks to Google Gemini in one API call
#    - Receives N × 3072-dimensional vectors
#
# 2. store_chunks:
#    - Bulk-inserts all chunks with their corresponding embeddings
#    - Uses unnest to insert the entire batch in one query
#    - Includes metadata (source, chunk_index) as JSONB
#
# 3. confirm_indexing:
#    - Sends notification with metadata (chunks indexed, cost, source)

name: rag_index_builder
description: Build a vector search index by embedding document chunks and storing them in PostgreSQL with pgvector

activities:
  # Step 1: Generate embeddings for all document chunks in batch
  - key: generate_embeddings
    worker: std
    activity_name: embedding
    parameters:
      model: google/gemini-embedding-001  # 3072 dimensions
      input: "{{INPUT.chunks}}"
    outputs:
      - embeddings

  # Step 2: Bulk-insert all chunks with their embeddings
  - key: store_chunks
    worker: std
    activity_name: postgres_query
    parameters:
      db_url: "{{SECRET.db_url}}"
      query: |
        WITH indexed AS (
          SELECT
            c.ord - 1 AS chunk_index,
            c.content,
            e.embedding::text::vector AS embedding
          FROM
            jsonb_array_elements_text($1::jsonb) WITH ORDINALITY AS c(content, ord)
          JOIN
            jsonb_array_elements($2::jsonb) WITH ORDINALITY AS e(embedding, ord)
            ON c.ord = e.ord
        )
        INSERT INTO document_chunks (content, embedding, metadata)
        SELECT
          content,
          embedding,
          jsonb_build_object('source', $3, 'chunk_index', chunk_index)
        FROM indexed
        RETURNING id
      params:
        - "{{INPUT.chunks}}"
        - "{{generate_embeddings.embeddings.embeddings}}"
        - "{{INPUT.source}}"
    outputs:
      - result
    depends_on:
      - generate_embeddings

  # Step 3: Send indexing confirmation
  - key: confirm_indexing
    worker: std
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Name: "Kruxia Flow"
          Email: "workflow@kruxiaflow.local"
        To:
          - Name: "Admin"
            Email: "admin@example.com"
        Subject: "RAG Indexing Complete - {{INPUT.source}}"
        Text: |
          Status: indexing_complete
          Workflow ID: {{WORKFLOW.id}}
          Chunks Indexed: {{store_chunks.result.row_count}}
          Cost (USD): {{generate_embeddings.embeddings.cost_usd}}
          Source: {{INPUT.source}}
    depends_on:
      - store_chunks
