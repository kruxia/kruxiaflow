name: delayed_reminder_system
activities:
  # Send initial notification
  - key: send_initial_notification
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Name: "Kruxia Flow Reminders"
          Email: "reminders@kruxiaflow.local"
        To:
          - Name: "Assigned User"
            Email: "{{INPUT.assigned_user}}"
        Subject: "Task Assigned: {{INPUT.task_name}}"
        Text: |
          Task assigned: {{INPUT.task_name}}
          Priority: normal

  # Wait 1 minute, then send first reminder
  - key: send_first_reminder
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Name: "Kruxia Flow Reminders"
          Email: "reminders@kruxiaflow.local"
        To:
          - Name: "Assigned User"
            Email: "{{INPUT.assigned_user}}"
        Subject: "Reminder: {{INPUT.task_name}} is still pending"
        Text: |
          Reminder: {{INPUT.task_name}} is still pending
          Priority: normal
    settings:
      delay: "1m"  # 1 minute
    depends_on:
      - send_initial_notification

  # Wait 2 more minutes (3 minutes total), send escalated reminder
  - key: send_escalated_reminder
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Name: "Kruxia Flow Reminders"
          Email: "reminders@kruxiaflow.local"
        To:
          - Name: "Manager"
            Email: "{{INPUT.manager_email}}"
        Subject: "ESCALATED: {{INPUT.task_name}} pending for 3 minutes"
        Text: |
          ESCALATED: {{INPUT.task_name}} pending for 3 minutes
          Assigned to: {{INPUT.assigned_user}}
          Priority: high
    settings:
      delay: "2m"  # 2 minutes (from first_reminder)
    depends_on:
      - send_first_reminder

  # Final escalation after 8 minutes total
  - key: send_final_escalation
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Name: "Kruxia Flow Reminders"
          Email: "reminders@kruxiaflow.local"
        To:
          - Name: "On-Call"
            Email: "{{INPUT.oncall_email}}"
        Subject: "CRITICAL: {{INPUT.task_name}} pending for 8 minutes"
        Text: |
          CRITICAL: {{INPUT.task_name}} pending for 8 minutes
          Requires immediate action.
    settings:
      delay: "5m"  # 5 more minutes (8 total)
    depends_on:
      - send_escalated_reminder
