name: weather_report_dynamic
activities:
  - key: geocode
    activity_name: http_request
    parameters:
      method: GET
      url: "https://geocoding.geo.census.gov/geocoder/locations/onelineaddress"
      query:
        address: "{{INPUT.address}}"  # must be a complete single-line address
        benchmark: "4"  # corresponds to the current benchmark
        format: "json"
    outputs:
      - response

  - key: get_grid
    activity_name: http_request
    parameters:
      method: GET
      url: "https://api.weather.gov/points/{{geocode.response.body.result.addressMatches[0].coordinates.y}},{{geocode.response.body.result.addressMatches[0].coordinates.x}}"
    outputs:
      - response
    depends_on:
      - geocode

  - key: fetch_forecast
    activity_name: http_request
    parameters:
      method: GET
      url: "{{get_grid.response.body.properties.forecast}}"
    outputs:
      - response
    depends_on:
      - get_grid

  - key: send_notification
    activity_name: http_request
    parameters:
      method: POST
      url: "http://mailpit:8025/api/v1/send"
      headers:
        Content-Type: "application/json"
      body:
        From:
          Name: "Kruxia Flow"
          Email: "workflow@kruxiaflow.local"
        To:
          - Name: "Weather Subscriber"
            Email: "weather@example.com"
        Subject: "Weather Report - {{INPUT.address}}"
        Text: |
          Address: {{INPUT.address}}
          Temperature: {{fetch_forecast.response.body.properties.periods[0].temperature}}
          Conditions: {{fetch_forecast.response.body.properties.periods[0].shortForecast}}
          Detailed Forecast: {{fetch_forecast.response.body.properties.periods[0].detailedForecast}}
    depends_on:
      - fetch_forecast