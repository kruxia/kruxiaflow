# Development overrides - automatically loaded by docker compose
#
# This file provides sensible defaults for local development.
# It is NOT suitable for production use.
#
# To use production settings, explicitly specify the base file only:
#   docker compose -f docker-compose.yml --profile deploy up
#
# For development, this file is auto-loaded:
#   docker compose --profile develop up

services:
  # Connect to frontend network since backend is internal-only
  # Port binding comes from base file (use POSTGRES_PORT env var to override)
  postgres:
    networks:
      - backend
      - frontend

  # Connect to frontend network since backend is internal-only
  # Port binding comes from base file (use REDIS_PORT env var to override)
  redis:
    networks:
      - backend
      - frontend

  # Expose Kruxia Flow on all interfaces for local testing
  kruxiaflow-develop:
    ports:
      - "8080:8080"

  kruxiaflow-profiling:
    ports:
      - "8080:8080"
