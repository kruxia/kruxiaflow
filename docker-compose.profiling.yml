# Profiling overrides - jemalloc memory profiling
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.profiling.yml up
#   ./docker up --profiling
#
# Saves jemalloc profiles and memory tracking to /opt/var/

services:
  kruxiaflow:
    build:
      target: profiling
    environment:
      # Separate database for profiling
      DATABASE_URL: postgres://${POSTGRES_USER:-kruxiaflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/kruxiaflow_profiling
      DATABASE_ADMIN_URL: postgres://${POSTGRES_USER:-kruxiaflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-kruxiaflow}
      CARGO_HOME: /opt/.cargo
      CARGO_TARGET_DIR: /opt/target
      # Profiling uses minimal workers
      KRUXIAFLOW_WORKER_COUNT: "1"
      KRUXIAFLOW_WORKER_POLL_MAX_ACTIVITIES: "1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 6G
    volumes:
      - ./:/opt/
      - cargo_cache:/opt/.cargo/registry
      - cargo_git_cache:/opt/.cargo/git
      - cargo_target_cache:/opt/target

volumes:
  cargo_cache:
    name: kruxiaflow-cargo-cache
    labels:
      com.kruxiaflow.volume: "build-cache"
  cargo_git_cache:
    name: kruxiaflow-cargo-git
    labels:
      com.kruxiaflow.volume: "build-cache"
  cargo_target_cache:
    name: kruxiaflow-cargo-target
    labels:
      com.kruxiaflow.volume: "build-cache"
