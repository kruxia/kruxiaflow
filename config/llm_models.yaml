# LLM Model Catalog - Pricing as of July 2026
# Sources:
# - OpenAI: https://developers.openai.com/api/docs/pricing
# - Anthropic: https://platform.claude.com/docs/en/about-claude/pricing
# - Google: https://ai.google.dev/gemini-api/docs/pricing
# - Ollama: Self-hosted (free)
#
# NOTE (Sonnet 5): introductory pricing is encoded below through 2026-08-31.
# On 2026-09-01 update claude-sonnet-5 to input 3.00 / output 15.00 /
# cached 0.30 / cache write 3.75.
#
# NOTE (cache_write_price_per_million): billed for reported
# cache_creation_tokens. Anthropic charges 1.25x input for cache writes
# (5-minute TTL). Models without this field bill cache writes at the
# input-token price. OpenAI has no separate cache-write charge. Google has
# no write premium either.
#
# NOTE (cache_storage_price_per_million_token_hours): billed for reported
# cache_storage_token_hours (explicit Gemini context caching bills STORAGE
# per token-hour for the cache's lifetime; verified 2026-07-19 from
# https://ai.google.dev/gemini-api/docs/pricing). Models without this field
# record reported token-hours at cost 0 with a warning — there is no
# sensible fallback price for a time-based dimension.

providers:
  # OpenAI Provider
  - name: openai
    display_name: OpenAI
    api_endpoint: https://api.openai.com/v1
    supports_completion: true
    supports_embeddings: true
