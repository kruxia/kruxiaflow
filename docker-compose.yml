services:
  postgres:
    image: postgres:18
    container_name: streamflow-postgres
    environment:
      POSTGRES_USER: streamflow
      POSTGRES_PASSWORD: streamflow_dev
      POSTGRES_DB: streamflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
