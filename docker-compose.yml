services:
  postgres:
    image: postgres:18
    container_name: streamflow-postgres
    environment:
      POSTGRES_USER: streamflow
      POSTGRES_PASSWORD: streamflow_dev
      POSTGRES_DB: streamflow
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "log_min_duration_statement=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: streamflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Mailhog for email testing (US-5.7a email_send activity)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: streamflow-mailhog
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI for viewing emails
    profiles: 
      - develop
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1025"]
      interval: 5s
      timeout: 3s
      retries: 5

  # streamflow serve in develop mode
  streamflow-develop:
    build:
      context: .
      dockerfile: Dockerfile
      target: develop
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    profiles:
      - develop
    environment:
      # Database connection (benchmark database)
      DATABASE_URL: postgres://streamflow:streamflow_dev@postgres:5432/streamflow
      # Rust build settings
      CARGO_HOME: /opt/.cargo
      CARGO_TARGET_DIR: /opt/target
      STREAMFLOW_CLIENT_ID: streamflow-dev-client
      STREAMFLOW_CLIENT_SECRET: a_zBZWlw8IsQaQm5C2xJPMgunAj4jkjzp4iTafATVcD8RU02yNEYqwCdLsoXIe8g
      STREAMFLOW_OAUTH_TOKEN_ISSUER: http://localhost:8080
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: streamflow-dev-audience
      STREAMFLOW_WORKER_COUNT: "20"
      STREAMFLOW_POLL_MAX_ACTIVITIES: "1"
      # Cache configuration
      STREAMFLOW_CACHE_PROVIDER: ${STREAMFLOW_CACHE_PROVIDER:-redis}
      STREAMFLOW_REDIS_URL: redis://redis:6379
      # Logging configuration (can be overridden from host environment)
      STREAMFLOW_LOG_LEVEL: ${STREAMFLOW_LOG_LEVEL:-info}
    volumes:
      # Mount source code
      - ./:/opt/
      # Persist cargo cache for faster rebuilds
      - cargo_cache:/opt/.cargo/registry
      - cargo_git_cache:/opt/.cargo/git
      - cargo_target_cache:/opt/target

  # streamflow serve in profiling mode. saves jemalloc profiles and memory tracking to /opt/var/
  streamflow-profiling:
    build:
      context: .
      dockerfile: Dockerfile
      target: profiling
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    profiles:
      - profiling
    environment:
      # Database connection (benchmark database)
      DATABASE_URL: postgres://streamflow:streamflow_dev@postgres:5432/streamflow_profiling
      DATABASE_ADMIN_URL: postgres://streamflow:streamflow_dev@postgres:5432/streamflow
      # Rust build settings
      CARGO_HOME: /opt/.cargo
      CARGO_TARGET_DIR: /opt/target
      STREAMFLOW_CLIENT_ID: streamflow-dev-client
      STREAMFLOW_CLIENT_SECRET: a_zBZWlw8IsQaQm5C2xJPMgunAj4jkjzp4iTafATVcD8RU02yNEYqwCdLsoXIe8g
      STREAMFLOW_OAUTH_TOKEN_ISSUER: http://localhost:8080
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: streamflow-dev-audience
      STREAMFLOW_WORKER_COUNT: "1"
      STREAMFLOW_POLL_MAX_ACTIVITIES: "1"
      # Cache configuration
      STREAMFLOW_CACHE_PROVIDER: ${STREAMFLOW_CACHE_PROVIDER:-redis}
      STREAMFLOW_REDIS_URL: redis://redis:6379
      # Logging configuration (can be overridden from host environment)
      STREAMFLOW_LOG_LEVEL: ${STREAMFLOW_LOG_LEVEL:-info}
    volumes:
      # Mount source code
      - ./:/opt/
      # Persist cargo cache for faster rebuilds
      - cargo_cache:/opt/.cargo/registry
      - cargo_git_cache:/opt/.cargo/git
      - cargo_target_cache:/opt/target

  # Init container - runs migrations, seeds OAuth, generates secrets
  # Runs once before streamflow-deploy starts
  streamflow-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: init
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - deploy
    environment:
      DATABASE_URL: postgres://streamflow:streamflow_dev@postgres:5432/streamflow
      STREAMFLOW_CLIENT_ID: streamflow-dev-client
      STREAMFLOW_CLIENT_SECRET: a_zBZWlw8IsQaQm5C2xJPMgunAj4jkjzp4iTafATVcD8RU02yNEYqwCdLsoXIe8g
    volumes:
      - streamflow_secrets:/secrets
    command: >
      sh -c '
        set -e
        echo "StreamFlow Init: Starting..."

        # Generate RSA keys if not present
        if [ ! -f /secrets/private.pem ]; then
          echo "Generating RSA key pair..."
          openssl genrsa -out /secrets/private.pem 2048
          openssl rsa -in /secrets/private.pem -pubout -out /secrets/public.pem
          chmod 600 /secrets/private.pem
          chmod 644 /secrets/public.pem
        else
          echo "RSA keys already exist, skipping generation"
        fi

        # Run database migrations
        echo "Running database migrations..."
        cd /opt && sqlx migrate run

        # Seed OAuth client
        echo "Seeding OAuth client..."
        STREAMFLOW_OAUTH_RSA_PRIVATE_KEY_PEM=$$(cat /secrets/private.pem) seed-oauth-client

        echo "StreamFlow Init: Complete"
      '

  # Production-like deploy using distroless image
  streamflow-deploy:
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
    depends_on:
      streamflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    profiles:
      - deploy
    environment:
      DATABASE_URL: postgres://streamflow:streamflow_dev@postgres:5432/streamflow
      STREAMFLOW_CLIENT_ID: ${STREAMFLOW_CLIENT_ID:-streamflow-deploy-client}
      STREAMFLOW_CLIENT_SECRET: ${STREAMFLOW_CLIENT_SECRET:-ni93k3Mrgm0A2eGC_qh-ykGpVLDNZhKGaHsEiH-WnoZEKSptS0w0uA6iC8gnYitE}
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: ${STREAMFLOW_OAUTH_TOKEN_AUDIENCE:-streamflow-deploy-audience}
      STREAMFLOW_OAUTH_TOKEN_ISSUER: http://localhost:8080
      STREAMFLOW_WORKER_COUNT: "20"
      STREAMFLOW_POLL_MAX_ACTIVITIES: "1"
      # File-based secrets (Docker secrets pattern)
      STREAMFLOW_OAUTH_RSA_PRIVATE_KEY_PEM_FILE: /secrets/private.pem
      STREAMFLOW_OAUTH_RSA_PUBLIC_KEY_PEM_FILE: /secrets/public.pem
      # Cache configuration
      STREAMFLOW_CACHE_PROVIDER: ${STREAMFLOW_CACHE_PROVIDER:-redis}
      STREAMFLOW_REDIS_URL: redis://redis:6379
      # Logging configuration
      STREAMFLOW_LOG_LEVEL: ${STREAMFLOW_LOG_LEVEL:-info}
    volumes:
      - streamflow_secrets:/secrets:ro

volumes:
  postgres_data:
  redis_data:
  cargo_cache:
  cargo_git_cache:
  cargo_target_cache:
  streamflow_secrets:
