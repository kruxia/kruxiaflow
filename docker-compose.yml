# StreamFlow Docker Compose Configuration
#
# Profiles:
#   - develop: Development with hot reload and source mounting
#   - profiling: Memory profiling with jemalloc
#   - deploy: Production deployment with prebuilt image
#
# Quick Start (development):
#   ./dev up                           # Auto-initializes on first run
#
# Quick Start (production-like):
#   ./scripts/init.sh                  # One-time: generate secrets
#   docker compose --profile deploy up
#
# Required environment variables (see .env.example):
#   - POSTGRES_PASSWORD: Database password
#   - STREAMFLOW_CLIENT_ID: OAuth client ID
#   - STREAMFLOW_CLIENT_SECRET: OAuth client secret

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

networks:
  frontend:
    name: streamflow-frontend
  backend:
    name: streamflow-backend
    internal: true

services:
  postgres:
    image: postgres:18.1-bookworm
    container_name: streamflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-streamflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-streamflow}
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "log_min_duration_statement=100"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamflow}"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 512M
    labels:
      com.streamflow.service: "database"
      com.streamflow.component: "postgres"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: redis:7.4-alpine
    container_name: streamflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    command: redis-server --appendonly yes
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      com.streamflow.service: "cache"
      com.streamflow.component: "redis"
    security_opt:
      - no-new-privileges:true

  # Mailhog for email testing (US-5.7a email_send activity)
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: streamflow-mailhog
    ports:
      - "127.0.0.1:1025:1025"   # SMTP server
      - "127.0.0.1:8025:8025"   # Web UI for viewing emails
    networks:
      - backend
      - frontend
    profiles:
      - develop
    # healthcheck:
    #   <<: *healthcheck-defaults
    #   # Use HTTP API instead of SMTP to avoid noisy session logs
    #   test: ["CMD", "wget", "-q", "--spider", "http://localhost:8025/api/v2/messages?limit=1"]
    restart: unless-stopped
    # Suppress logs - mailhog is a dev tool, check UI at http://localhost:8025
    logging:
      driver: "none"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      com.streamflow.service: "email"
      com.streamflow.component: "mailhog"
      com.streamflow.profile: "develop"

  # StreamFlow API server in develop mode
  streamflow-develop:
    build:
      context: .
      dockerfile: Dockerfile
      target: develop
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${STREAMFLOW_PORT:-127.0.0.1:8080}:8080"
    networks:
      - frontend
      - backend
    profiles:
      - develop
    init: true
    stop_grace_period: 30s
    environment:
      # Database connection
      DATABASE_URL: postgres://${POSTGRES_USER:-streamflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-streamflow}
      # Rust build settings
      CARGO_HOME: /opt/.cargo
      CARGO_TARGET_DIR: /opt/target
      # OAuth configuration (required)
      STREAMFLOW_CLIENT_ID: ${STREAMFLOW_CLIENT_ID:?STREAMFLOW_CLIENT_ID is required}
      STREAMFLOW_CLIENT_SECRET: ${STREAMFLOW_CLIENT_SECRET:?STREAMFLOW_CLIENT_SECRET is required}
      STREAMFLOW_OAUTH_TOKEN_ISSUER: ${STREAMFLOW_OAUTH_TOKEN_ISSUER:-http://localhost:8080}
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: ${STREAMFLOW_OAUTH_TOKEN_AUDIENCE:-streamflow-api}
      # Worker configuration
      STREAMFLOW_WORKER_COUNT: ${STREAMFLOW_WORKER_COUNT:-20}
      STREAMFLOW_POLL_MAX_ACTIVITIES: ${STREAMFLOW_POLL_MAX_ACTIVITIES:-1}
      # Cache configuration
      STREAMFLOW_CACHE_PROVIDER: ${STREAMFLOW_CACHE_PROVIDER:-redis}
      STREAMFLOW_REDIS_URL: redis://redis:6379
      # Logging configuration
      STREAMFLOW_LOG_LEVEL: ${STREAMFLOW_LOG_LEVEL:-info}
    # No health check for develop - Rust build during startup takes several minutes
    # Use ./dev logs -f to monitor startup progress
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      com.streamflow.service: "api"
      com.streamflow.component: "streamflow"
      com.streamflow.profile: "develop"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      # Mount source code
      - ./:/opt/
      # Persist cargo cache for faster rebuilds
      - cargo_cache:/opt/.cargo/registry
      - cargo_git_cache:/opt/.cargo/git
      - cargo_target_cache:/opt/target

  # StreamFlow profiling mode - saves jemalloc profiles and memory tracking to /opt/var/
  streamflow-profiling:
    build:
      context: .
      dockerfile: Dockerfile
      target: profiling
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${STREAMFLOW_PORT:-127.0.0.1:8080}:8080"
    networks:
      - frontend
      - backend
    profiles:
      - profiling
    init: true
    stop_grace_period: 30s
    environment:
      # Database connection (separate database for profiling)
      DATABASE_URL: postgres://${POSTGRES_USER:-streamflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/streamflow_profiling
      DATABASE_ADMIN_URL: postgres://${POSTGRES_USER:-streamflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-streamflow}
      # Rust build settings
      CARGO_HOME: /opt/.cargo
      CARGO_TARGET_DIR: /opt/target
      # OAuth configuration (required)
      STREAMFLOW_CLIENT_ID: ${STREAMFLOW_CLIENT_ID:?STREAMFLOW_CLIENT_ID is required}
      STREAMFLOW_CLIENT_SECRET: ${STREAMFLOW_CLIENT_SECRET:?STREAMFLOW_CLIENT_SECRET is required}
      STREAMFLOW_OAUTH_TOKEN_ISSUER: ${STREAMFLOW_OAUTH_TOKEN_ISSUER:-http://localhost:8080}
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: ${STREAMFLOW_OAUTH_TOKEN_AUDIENCE:-streamflow-api}
      # Profiling uses minimal workers
      STREAMFLOW_WORKER_COUNT: "1"
      STREAMFLOW_POLL_MAX_ACTIVITIES: "1"
      # Cache configuration
      STREAMFLOW_CACHE_PROVIDER: ${STREAMFLOW_CACHE_PROVIDER:-redis}
      STREAMFLOW_REDIS_URL: redis://redis:6379
      # Logging configuration
      STREAMFLOW_LOG_LEVEL: ${STREAMFLOW_LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      start_period: 120s
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 512M
    labels:
      com.streamflow.service: "api"
      com.streamflow.component: "streamflow"
      com.streamflow.profile: "profiling"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      # Mount source code
      - ./:/opt/
      # Persist cargo cache for faster rebuilds
      - cargo_cache:/opt/.cargo/registry
      - cargo_git_cache:/opt/.cargo/git
      - cargo_target_cache:/opt/target

  # Production deployment
  # Uses kruxia/streamflow from Docker Hub if available, builds locally otherwise
  # Run scripts/init.sh first to generate secrets
  streamflow-deploy:
    image: kruxia/streamflow:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${STREAMFLOW_PORT:-8080}:8080"
    networks:
      - frontend
      - backend
    profiles:
      - deploy
    init: true
    stop_grace_period: 30s
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-streamflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-streamflow}
      # OAuth configuration (required)
      STREAMFLOW_CLIENT_ID: ${STREAMFLOW_CLIENT_ID:?STREAMFLOW_CLIENT_ID is required}
      STREAMFLOW_CLIENT_SECRET: ${STREAMFLOW_CLIENT_SECRET:?STREAMFLOW_CLIENT_SECRET is required}
      STREAMFLOW_OAUTH_TOKEN_ISSUER: ${STREAMFLOW_OAUTH_TOKEN_ISSUER:-http://localhost:8080}
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: ${STREAMFLOW_OAUTH_TOKEN_AUDIENCE:-streamflow-api}
      # Worker configuration
      STREAMFLOW_WORKER_COUNT: ${STREAMFLOW_WORKER_COUNT:-20}
      STREAMFLOW_POLL_MAX_ACTIVITIES: ${STREAMFLOW_POLL_MAX_ACTIVITIES:-1}
      # Cache configuration
      STREAMFLOW_CACHE_PROVIDER: ${STREAMFLOW_CACHE_PROVIDER:-redis}
      STREAMFLOW_REDIS_URL: redis://redis:6379
      # Logging configuration
      STREAMFLOW_LOG_LEVEL: ${STREAMFLOW_LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      com.streamflow.service: "api"
      com.streamflow.component: "streamflow"
      com.streamflow.profile: "deploy"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./dev-keys:/secrets:ro

volumes:
  postgres_data:
    name: streamflow-postgres-data
    labels:
      com.streamflow.volume: "database"
  redis_data:
    name: streamflow-redis-data
    labels:
      com.streamflow.volume: "cache"
  cargo_cache:
    name: streamflow-cargo-cache
    labels:
      com.streamflow.volume: "build-cache"
  cargo_git_cache:
    name: streamflow-cargo-git
    labels:
      com.streamflow.volume: "build-cache"
  cargo_target_cache:
    name: streamflow-cargo-target
    labels:
      com.streamflow.volume: "build-cache"
