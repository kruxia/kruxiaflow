# Kruxia Flow Docker Compose - Production Base
#
# This file defines the production-ready configuration.
#
# Usage:
#   ./docker up                                      # Production (default)
#   ./docker up --develop                            # Development
#   ./docker up --profiling                          # Profiling
#
# Required environment variables (see .env.example):
#   - POSTGRES_PASSWORD: Database password
#   - KRUXIAFLOW_CLIENT_ID: OAuth client ID
#   - KRUXIAFLOW_CLIENT_SECRET: OAuth client secret

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 10s

networks:
  frontend:
    name: kruxiaflow-frontend
  backend:
    name: kruxiaflow-backend
    internal: true

services:
  postgres:
    platform: linux/amd64
    image: postgres:17-bookworm
    container_name: kruxiaflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kruxiaflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-kruxiaflow}
    command:
      - "postgres"
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "log_min_duration_statement=100"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - frontend
      - backend
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kruxiaflow}"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    labels:
      com.kruxiaflow.service: "database"
      com.kruxiaflow.component: "postgres"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  redis:
    platform: linux/amd64
    image: redis:7.4-alpine
    container_name: kruxiaflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
      - frontend
    command: redis-server --appendonly yes
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      com.kruxiaflow.service: "cache"
      com.kruxiaflow.component: "redis"
    security_opt:
      - no-new-privileges:true

  kruxiaflow:
    platform: linux/amd64
    image: kruxia/kruxiaflow:latest
    container_name: kruxiaflow-server
    build:
      context: .
      dockerfile: Dockerfile
      target: deploy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${KRUXIAFLOW_PORT:-8080}:8080"
    networks:
      - frontend
      - backend
    init: true
    stop_grace_period: 30s
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kruxiaflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-kruxiaflow}
      # OAuth configuration (required)
      KRUXIAFLOW_CLIENT_ID: ${KRUXIAFLOW_CLIENT_ID:-}
      KRUXIAFLOW_CLIENT_SECRET: ${KRUXIAFLOW_CLIENT_SECRET:-}
      KRUXIAFLOW_OAUTH_TOKEN_ISSUER: ${KRUXIAFLOW_OAUTH_TOKEN_ISSUER:-http://localhost:8080}
      KRUXIAFLOW_OAUTH_TOKEN_AUDIENCE: ${KRUXIAFLOW_OAUTH_TOKEN_AUDIENCE:-kruxiaflow-api}
      # OAuth RSA keys (loaded from mounted secrets via _FILE pattern)
      KRUXIAFLOW_OAUTH_RSA_PRIVATE_KEY_PEM_FILE: /secrets/private.pem
      KRUXIAFLOW_OAUTH_RSA_PUBLIC_KEY_PEM_FILE: /secrets/public.pem
      # Worker configuration
      KRUXIAFLOW_WORKER_COUNT: ${KRUXIAFLOW_WORKER_COUNT:-20}
      KRUXIAFLOW_WORKER_POLL_MAX_ACTIVITIES: ${KRUXIAFLOW_WORKER_POLL_MAX_ACTIVITIES:-1}
      # Cache configuration
      KRUXIAFLOW_CACHE_PROVIDER: ${KRUXIAFLOW_CACHE_PROVIDER:-redis}
      KRUXIAFLOW_REDIS_URL: redis://redis:6379
      # LLM API keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      # Logging configuration
      KRUXIAFLOW_LOG_LEVEL: ${KRUXIAFLOW_LOG_LEVEL:-info}
    healthcheck:
      <<: *healthcheck-defaults
      # Use built-in health command (no shell/curl needed in distroless)
      test: ["CMD", "/kruxiaflow", "health", "--timeout", "5"]
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      com.kruxiaflow.service: "api"
      com.kruxiaflow.component: "kruxiaflow"
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./docker-keys:/secrets:ro
      - ./config:/config:ro

volumes:
  postgres_data:
    name: kruxiaflow-postgres-data
    labels:
      com.kruxiaflow.volume: "database"
  redis_data:
    name: kruxiaflow-redis-data
    labels:
      com.kruxiaflow.volume: "cache"
