services:
  # StreamFlow stack
  streamflow-postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: streamflow
      POSTGRES_PASSWORD: streamflow
      POSTGRES_DB: streamflow
    volumes:
      - streamflow_pg_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U streamflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  streamflow:
    image: streamflow:latest
    build:
      context: ..
      dockerfile: Dockerfile
      target: deploy
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://streamflow:streamflow@streamflow-postgres:5432/streamflow
      STREAMFLOW_CLIENT_ID: benchmark
      STREAMFLOW_CLIENT_SECRET: benchmark_secret
      STREAMFLOW_OAUTH_TOKEN_ISSUER: http://localhost:8080
      STREAMFLOW_OAUTH_TOKEN_AUDIENCE: streamflow-dev-audience
      STREAMFLOW_WORKER_COUNT: "1" # default = 4
      STREAMFLOW_POLL_MAX_ACTIVITIES: "1" # default
      STREAMFLOW_LOG_LEVEL: info
    depends_on:
      - streamflow-postgres
    command: [ "serve" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Temporal stack
  temporal-postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      - temporal-postgres
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    healthcheck:
      test: [ "CMD", "tctl", "--address", "temporal:7233", "cluster", "health" ]
      interval: 5s
      timeout: 5s
      retries: 10

