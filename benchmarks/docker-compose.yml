services:
  # Kruxia Flow stack
  kruxiaflow-postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: kruxiaflow
      POSTGRES_PASSWORD: kruxiaflow
      POSTGRES_DB: kruxiaflow
    volumes:
      - kruxiaflow_pg_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kruxiaflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kruxiaflow:
    image: kruxia/kruxiaflow:latest
    build:
      context: ..
      dockerfile: Dockerfile
      target: deploy
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://kruxiaflow:kruxiaflow@kruxiaflow-postgres:5432/kruxiaflow
      KRUXIAFLOW_CLIENT_ID: benchmark
      KRUXIAFLOW_CLIENT_SECRET: benchmark_secret
      KRUXIAFLOW_OAUTH_TOKEN_ISSUER: http://localhost:8080
      KRUXIAFLOW_OAUTH_TOKEN_AUDIENCE: kruxiaflow-dev-audience
      KRUXIAFLOW_WORKER_COUNT: "1" # default = 4
      KRUXIAFLOW_POLL_MAX_ACTIVITIES: "1" # default
      KRUXIAFLOW_LOG_LEVEL: info
      # OAuth RSA keys for JWT signing/validation (dev keys from ../dev-keys/)
      # TODO: make this seamless with dev setup
      KRUXIAFLOW_OAUTH_RSA_PRIVATE_KEY_PEM: "${KRUXIAFLOW_OAUTH_RSA_PRIVATE_KEY_PEM:-}"
      KRUXIAFLOW_OAUTH_RSA_PUBLIC_KEY_PEM: "${KRUXIAFLOW_OAUTH_RSA_PUBLIC_KEY_PEM:-}"
    depends_on:
      - kruxiaflow-postgres
    command: [ "serve", "--migrate", "--seed-client" ]
    healthcheck:
      test: [ "CMD", "/kruxiaflow", "version" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Temporal stack
  temporal-postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_pg_data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.24.2
    depends_on:
      - temporal-postgres
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgres
    healthcheck:
      test: [ "CMD", "tctl", "--address", "temporal:7233", "cluster", "health" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Airflow 3 stack
  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow" ]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-redis:
    image: redis:7
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:3.0.1
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
      # Shared secrets needed for benchmarking Airflow 3
      AIRFLOW__CORE__FERNET_KEY: 'N_I6osIH0QQbRCOt1y2G-fQOlpi7jt8igzosFN4j6l8='
      AIRFLOW__API_AUTH__JWT_SECRET: 'benchmark-jwt-secret-key-12345'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'benchmark-webserver-secret-key-12345'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
    volumes:
      - ./airflow_bench:/opt/airflow/dags
    entrypoint: /bin/bash
    command:
      - -c
      - airflow db migrate

  airflow-api-server:
    image: apache/airflow:3.0.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
      # Shared secrets needed for benchmarking Airflow 3
      AIRFLOW__CORE__FERNET_KEY: 'N_I6osIH0QQbRCOt1y2G-fQOlpi7jt8igzosFN4j6l8='
      AIRFLOW__API_AUTH__JWT_SECRET: 'benchmark-jwt-secret-key-12345'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'benchmark-webserver-secret-key-12345'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 10
    volumes:
      - ./airflow_bench:/opt/airflow/dags
    command: api-server
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/api/v2/monitor/health" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  airflow-scheduler:
    image: apache/airflow:3.0.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
      # Shared secrets needed for benchmarking Airflow 3
      AIRFLOW__CORE__FERNET_KEY: 'N_I6osIH0QQbRCOt1y2G-fQOlpi7jt8igzosFN4j6l8='
      AIRFLOW__API_AUTH__JWT_SECRET: 'benchmark-jwt-secret-key-12345'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'benchmark-webserver-secret-key-12345'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 10
    volumes:
      - ./airflow_bench:/opt/airflow/dags
    command: scheduler
    healthcheck:
      test: [ "CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\"" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  airflow-dag-processor:
    image: apache/airflow:3.0.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
      # Shared secrets needed for benchmarking Airflow 3
      AIRFLOW__CORE__FERNET_KEY: 'N_I6osIH0QQbRCOt1y2G-fQOlpi7jt8igzosFN4j6l8='
      AIRFLOW__API_AUTH__JWT_SECRET: 'benchmark-jwt-secret-key-12345'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'benchmark-webserver-secret-key-12345'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 10
    volumes:
      - ./airflow_bench:/opt/airflow/dags
    command: dag-processor

  airflow-worker:
    image: apache/airflow:3.0.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://:@airflow-redis:6379/0
      # Shared secrets needed for benchmarking Airflow 3
      AIRFLOW__CORE__FERNET_KEY: 'N_I6osIH0QQbRCOt1y2G-fQOlpi7jt8igzosFN4j6l8='
      AIRFLOW__API_AUTH__JWT_SECRET: 'benchmark-jwt-secret-key-12345'
      AIRFLOW__WEBSERVER__SECRET_KEY: 'benchmark-webserver-secret-key-12345'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: 'true'
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
      AIRFLOW__CELERY__WORKER_CONCURRENCY: 16
    volumes:
      - ./airflow_bench:/opt/airflow/dags
    command: celery worker
    deploy:
      replicas: 2

  # Benchmark runner
  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    depends_on:
      kruxiaflow:
        condition: service_healthy
      temporal:
        condition: service_healthy
      # airflow-api-server:
      #   condition: service_healthy
      # airflow-scheduler:
      #   condition: service_healthy
      # airflow-dag-processor:
      #   condition: service_started
      # airflow-worker:
      #   condition: service_started
    volumes:
      - ./:/app/
      - /var/run/docker.sock:/var/run/docker.sock  # For resource monitoring
    # NOTE: Airflow benchmarking is currently disabled due to performance issues in Airflow 3
    command: [ "python", "run_benchmark.py", "run", "-p", "kruxiaflow", "-p", "temporal" ]

volumes:
  kruxiaflow_pg_data:
  temporal_pg_data:
  airflow_pg_data:
