# Cloud deployment overrides - PostgreSQL on host system
#
# For single-VM deployments where PostgreSQL is installed on the host.
# Uses host networking so services reach system PostgreSQL on localhost.
#
# Usage:
#   ./docker cloud up
#   docker compose -f docker-compose.yml -f docker-compose.cloud.yml up

services:
  # Disable containerized postgres - using system-installed PostgreSQL
  postgres:
    profiles:
      - disabled

  # Redis on host network (reset networks from base to avoid conflict)
  redis:
    networks: !reset {}
    network_mode: host

  # Kruxiaflow on host network, connecting to system PostgreSQL
  kruxiaflow:
    networks: !reset {}
    network_mode: host
    depends_on: !override
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-kruxiaflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@${POSTGRES_HOST:-localhost}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-kruxiaflow}
      KRUXIAFLOW_REDIS_URL: redis://localhost:${REDIS_PORT:-6379}
